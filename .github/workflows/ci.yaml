name: Pulling docker-app image and db in docker

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkouting
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          else
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}"

            if [ -z "$POSTGRES_USER" ]; then POSTGRES_USER="safeincident"; fi
            if [ -z "$POSTGRES_PASSWORD" ]; then POSTGRES_PASSWORD="safeincident"; fi
            if [ -z "$POSTGRES_DB" ]; then POSTGRES_DB="safeincident"; fi
            if [ -z "$POSTGRES_HOST" ]; then POSTGRES_HOST="safeincident-db"; fi

            echo "DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}" > .env
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create virtual environment
        run: |
          python -m venv venv
          echo "Virtual environment created"

      - name: Activate virtual environment and upgrade pip
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install pre-commit hooks
        run: |
          source venv/bin/activate
          pre-commit install || echo "Pre-commit install skipped"
          pre-commit --version || echo "Pre-commit not found"

      - name: Run pre-commit
        run: |
          source venv/bin/activate
          pre-commit run --all-files --verbose || true

      - name: Run Flake8 (PEP8)
        run: |
          source venv/bin/activate
          flake8 --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Run PyLint
        run: |
          source venv/bin/activate
          pylint --rcfile=pylintrc backend --fail-under=7.0 || true

      - name: Run Bandit (Security)
        run: |
          source venv/bin/activate
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll || true

      - name: Run Safety (Dependencies Security)
        run: |
          source venv/bin/activate
          safety check --json || true
          safety check || true

      - name: Run MyPy (Type Checking)
        run: |
          source venv/bin/activate
          mypy --ignore-missing-imports backend || true

      - name: Stop existing containers (if any)
        run: |
          docker compose down || true
          echo "Existing containers stopped"

      - name: Build and start Docker containers
        run: |
          docker compose build --no-cache
          docker compose up -d

      - name: Wait for database to be ready
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          max_attempts=30
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if docker exec safeincident-db pg_isready -U safeincident > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi

            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: Waiting for PostgreSQL..."
            sleep 2
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: PostgreSQL did not become ready in time"
            docker logs safeincident-db
            exit 1
          fi

      - name: Check application container status
        run: |
          echo "Checking application container status..."

          CONTAINER_STATUS=$(docker ps -a --filter "name=safeincident-app" --format "{{.Status}}")
          echo "Container status: $CONTAINER_STATUS"

          if ! docker ps --filter "name=safeincident-app" --format "{{.Names}}" | grep -q "safeincident-app"; then
            echo "ERROR: Application container is not running!"
            echo "Container logs:"
            docker logs safeincident-app || echo "Cannot get logs"
            echo "Docker compose logs:"
            docker compose logs app || echo "Cannot get compose logs"
            exit 1
          fi

          if docker exec safeincident-app ps aux | grep -q "[p]ython.*uvicorn"; then
            echo "Python process is running in container"
          else
            echo "ERROR: Python process is NOT running in container!"
            echo "Processes in container:"
            docker exec safeincident-app ps aux || echo "Cannot check processes"
            echo "Container logs:"
            docker logs safeincident-app --tail 50
            exit 1
          fi

      - name: Check application health
        run: |
          echo "Checking application health endpoint..."
          max_attempts=30
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if docker exec safeincident-app curl -f http://localhost:8000/ > /dev/null 2>&1; then
              echo "Application is responding from inside container!"
              break
            fi

            if curl -f http://localhost:8000/ > /dev/null 2>&1; then
              echo "Application is responding from host!"
              break
            fi

            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: Waiting for application..."

            if [ $((attempt % 5)) -eq 0 ]; then
              echo "Recent application logs:"
              docker logs safeincident-app --tail 20
            fi

            sleep 2
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: Application did not respond after $max_attempts attempts"
            echo "Full application logs:"
            docker logs safeincident-app
            echo ""
            echo "Docker compose logs:"
            docker compose logs app
            echo ""
            echo "Container status:"
            docker ps -a --filter "name=safeincident-app"
            exit 1
          fi

          echo "Final health check:"
          curl -v http://localhost:8000/ || docker exec safeincident-app curl -v http://localhost:8000/

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          if-no-files-found: ignore
